services:
  # -------------------- POSTGRES --------------------
  postgres:
    image: postgres:17
    container_name: fakegaming-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${POSTGRES_DATA_PATH:-./data/postgres}:/var/lib/postgresql/data

  # -------------------- BOT --------------------
  bot:
    image: zeffuro/fakegaming-bot:latest
    container_name: fakegaming-bot
    restart: unless-stopped
    environment:
      DATABASE_PROVIDER: postgres
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DB_MIGRATIONS_ENABLED: 0
      DB_SYNC_ENABLED: 0
      DATA_ROOT: /app/data
      API_URL: 'http://api:3001/api'
      SERVICE_API_TOKEN: ${SERVICE_API_TOKEN}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      CLIENT_ID: ${BOT_DISCORD_CLIENT_ID}
      GUILD_ID: ${BOT_DISCORD_GUILD_ID}
      BOT_HEALTH_HOST: 0.0.0.0
      BOT_HEALTH_PORT: 8081
      RIOT_LEAGUE_API_KEY: ${RIOT_LEAGUE_API_KEY}
      RIOT_TFT_API_KEY: ${RIOT_TFT_API_KEY}
      RIOT_DEV_API_KEY: ${RIOT_DEV_API_KEY}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
    volumes:
      - ${BOT_DATA_PATH:-./data/bot}:/app/data
    depends_on:
      - postgres
      - api

  # -------------------- API --------------------
  api:
    image: zeffuro/fakegaming-api:latest
    container_name: fakegaming-api
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_PROVIDER: postgres
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DASHBOARD_URL: ${PRODUCTION_DASHBOARD_URL}
      PUBLIC_URL: ${PRODUCTION_API_URL}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${PRODUCTION_DASHBOARD_URL}/api/auth/discord/callback
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DASHBOARD_ADMINS: ${DASHBOARD_ADMINS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_AUDIENCE: fakegaming-dashboard
      JWT_ISSUER: fakegaming
      SERVICE_API_TOKEN: ${SERVICE_API_TOKEN}
      API_MEMBER_SEARCH_TTL_MS: 60000
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET}
      TWITCH_STARTUP_JITTER_MS: 8000
      TWITCH_TOKEN_ENC_KEY: ${TWITCH_TOKEN_ENC_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      YOUTUBE_ENRICH_EMBEDS: 0
      TIKTOK_COOKIE: ${TIKTOK_COOKIE}
    depends_on:
      - postgres

  # -------------------- DASHBOARD --------------------
  dashboard:
    image: zeffuro/fakegaming-dashboard:latest
    container_name: fakegaming-dashboard
    restart: unless-stopped
    environment:
      PORT: 3000
      PUBLIC_URL: ${PRODUCTION_DASHBOARD_URL}
      API_URL: 'http://api:3001/api'
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DASHBOARD_ADMINS: ${DASHBOARD_ADMINS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_AUDIENCE: fakegaming-dashboard
      JWT_ISSUER: fakegaming
    depends_on:
      - api
    ports:
      - "3000:3000"
