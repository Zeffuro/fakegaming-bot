services:
  # -------------------- POSTGRES --------------------
  # Bundled Postgres for self-hosted deployments. Disable the bundled-postgres
  # profile and set DATABASE_URL if you use an external Postgres server.
  postgres:
    image: postgres:17
    profiles: ["bundled-postgres"]
    container_name: fakegaming-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${POSTGRES_DATA_PATH:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${FORWARD_DB_PORT:-127.0.0.1:5432}:5432"

  # -------------------- REDIS --------------------
  # Convenience Redis for self-hosted deployments. Set REDIS_URL to a hosted
  # Redis connection string and disable the bundled-redis profile if you use managed Redis.
  redis:
    image: redis:7-alpine
    profiles: ["bundled-redis"]
    container_name: fakegaming-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${REDIS_DATA_PATH:-./data/redis}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # -------------------- API --------------------
  api:
    image: zeffuro/fakegaming-api:latest
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: fakegaming-api
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_PROVIDER: ${DATABASE_PROVIDER:-postgres}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DASHBOARD_URL: ${PRODUCTION_DASHBOARD_URL}
      PUBLIC_URL: ${PRODUCTION_API_URL}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${PRODUCTION_DASHBOARD_URL}/api/auth/discord/callback
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DASHBOARD_ADMINS: ${DASHBOARD_ADMINS}
      JOBS_ENABLED: 1
      JWT_SECRET: ${JWT_SECRET}
      JWT_AUDIENCE: fakegaming-dashboard
      JWT_ISSUER: fakegaming
      SERVICE_API_TOKEN: ${SERVICE_API_TOKEN}
      API_MEMBER_SEARCH_TTL_MS: 60000
      JOB_RUN_RETENTION_DAYS: ${JOB_RUN_RETENTION_DAYS:-7}
      JOB_RUN_MAX_ROWS_PER_JOB: ${JOB_RUN_MAX_ROWS_PER_JOB:-1000}
      JOB_RUN_CLEANUP_INTERVAL_MS: ${JOB_RUN_CLEANUP_INTERVAL_MS:-3600000}
      JOB_RUN_SUCCESS_SAMPLE_RATE: ${JOB_RUN_SUCCESS_SAMPLE_RATE:-1}
      PGBOSS_RETENTION_SECONDS: ${PGBOSS_RETENTION_SECONDS:-86400}
      PGBOSS_DELETE_AFTER_SECONDS: ${PGBOSS_DELETE_AFTER_SECONDS:-86400}
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET}
      TWITCH_STARTUP_JITTER_MS: 8000
      TWITCH_TOKEN_ENC_KEY: ${TWITCH_TOKEN_ENC_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      YOUTUBE_ENRICH_EMBEDS: 0
      TIKTOK_COOKIE: ${TIKTOK_COOKIE}
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

  # -------------------- BOT --------------------
  bot:
    image: zeffuro/fakegaming-bot:latest
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: fakegaming-bot
    restart: unless-stopped
    environment:
      DATABASE_PROVIDER: ${DATABASE_PROVIDER:-postgres}
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}}
      DB_MIGRATIONS_ENABLED: 0
      DB_SYNC_ENABLED: 0
      DATA_ROOT: /app/data
      API_URL: 'http://api:3001/api'
      SERVICE_API_TOKEN: ${SERVICE_API_TOKEN}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      CLIENT_ID: ${BOT_DISCORD_CLIENT_ID}
      GUILD_ID: ${BOT_DISCORD_GUILD_ID}
      BOT_HEALTH_HOST: 0.0.0.0
      BOT_HEALTH_PORT: 8081
      RIOT_LEAGUE_API_KEY: ${RIOT_LEAGUE_API_KEY}
      RIOT_TFT_API_KEY: ${RIOT_TFT_API_KEY}
      RIOT_DEV_API_KEY: ${RIOT_DEV_API_KEY}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
    volumes:
      - ${BOT_DATA_PATH:-./data/bot}:/app/data
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8081/ready').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # -------------------- DASHBOARD --------------------
  dashboard:
    image: zeffuro/fakegaming-dashboard:latest
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: fakegaming-dashboard
    restart: unless-stopped
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      PUBLIC_URL: ${PRODUCTION_DASHBOARD_URL}
      API_URL: 'http://api:3001/api'
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DASHBOARD_ADMINS: ${DASHBOARD_ADMINS}
      JWT_SECRET: ${JWT_SECRET}
      JWT_AUDIENCE: fakegaming-dashboard
      JWT_ISSUER: fakegaming
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
